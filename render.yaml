services:
  - type: web
    name: eaasgrid-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  - type: web
    name: eaasgrid-dashboard
    runtime: node
    plan: free
    rootDir: apps/dashboard
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        sync: false

  - type: web
    name: eaasgrid-investor-portal
    runtime: node
    plan: free
    rootDir: apps/investor-portal
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_DASHBOARD_URL
        sync: false
